###
### ServiceAccount for sandbox manager
###
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-manager
  namespace: prometheon-platform
---
###
### ClusterRole — permissions to manage tenant namespaces + resources
###
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheon-sandbox-manager
rules:
  # Namespace lifecycle
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Deploy services into tenant namespaces
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # ResourceQuota + NetworkPolicy
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["create", "delete", "get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list"]
  # Jobs (toxiproxy-init)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list"]
---
###
### ClusterRoleBinding
###
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheon-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: sandbox-manager
    namespace: prometheon-platform
roleRef:
  kind: ClusterRole
  name: prometheon-sandbox-manager
  apiGroup: rbac.authorization.k8s.io
---
###
### Deployment
###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: prometheon-platform
  labels:
    app: sandbox-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-manager
  template:
    metadata:
      labels:
        app: sandbox-manager
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: sandbox-manager
          image: 171704188983.dkr.ecr.us-east-1.amazonaws.com/prometheon/sandbox-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
          env:
            - name: SERVICE_A_IMAGE
              value: "171704188983.dkr.ecr.us-east-1.amazonaws.com/prometheon/service-a:latest"
            - name: SERVICE_B_IMAGE
              value: "171704188983.dkr.ecr.us-east-1.amazonaws.com/prometheon/service-b:latest"
            - name: SERVICE_C_IMAGE
              value: "171704188983.dkr.ecr.us-east-1.amazonaws.com/prometheon/service-c:latest"
            - name: TOXIPROXY_IMAGE
              value: "shopify/toxiproxy"
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
---
###
### Service
###
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: prometheon-platform
spec:
  selector:
    app: sandbox-manager
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager-nodeport
  namespace: prometheon-platform
spec:
  type: NodePort
  selector:
    app: sandbox-manager
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900