          }
        },
        {
          "title": "P95 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service_name) (rate(prometheon_duration_milliseconds_bucket{service_name=~\".*$sandbox.*\"}[5m])))",
              "legendFormat": "{{service_name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": true
              },
              "unit": "ms"
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "title": "Request Count by Status",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "" },
