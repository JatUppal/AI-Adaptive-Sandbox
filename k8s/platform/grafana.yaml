###
### Grafana datasource provisioning
###
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: prometheon-platform
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
###
### Grafana dashboard provisioning config
###
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: prometheon-platform
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'prometheon'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
###
### Grafana dashboard JSON
###
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: prometheon-platform
data:
  chaos-engineering.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum by (service_name) (rate(prometheon_calls_total{service_name=~\".*$sandbox.*\"}[5m]))",
              "legendFormat": "{{service_name}}",
              "refId": "A"
