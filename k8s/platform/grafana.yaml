        {
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "(sum by (service_name) (rate(prometheon_calls_total{service_name=~\".*$sandbox.*\",status_code=\"STATUS_CODE_ERROR\"}[5m])) or (sum by (service_name) (rate(prometheon_calls_total{service_name=~\".*$sandbox.*\"}[5m])) * 0)) / sum by (service_name) (rate(prometheon_calls_total{service_name=~\".*$sandbox.*\"}[5m])) * 100",
              "legendFormat": "{{service_name}}",
              "refId": "A"
