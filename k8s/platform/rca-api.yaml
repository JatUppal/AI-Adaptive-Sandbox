apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-api
  namespace: prometheon-platform
  labels:
    app: rca-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-api
  template:
    metadata:
      labels:
        app: rca-api
    spec:
      containers:
        - name: rca-api
          image: 171704188983.dkr.ecr.us-east-1.amazonaws.com/prometheon/rca-api:latest
          imagePullPolicy: Always  # use local kind image
          ports:
            - containerPort: 8000
          env:
            - name: JAEGER_URL
              value: http://jaeger:16686
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: SCRIPTS_DIR
              value: /scripts
            - name: DATABASE_URL
              value: postgresql://prometheon:prometheon_dev@postgres:5432/prometheon
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: JWT_SECRET
              value: prometheon_dev_secret_change_in_prod
            - name: OPENAI_API_KEY
              value: ""
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: rca-api
  namespace: prometheon-platform
spec:
  selector:
    app: rca-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: rca-api-nodeport
  namespace: prometheon-platform
spec:
  type: NodePort
  selector:
    app: rca-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800